# Build, test, create portable releases + MSI installer, and publish a GitHub Release
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build and create portable zips
      run: dotnet build -c Release
      env:
        BUILD_NUMBER: ${{ github.run_number }}

    - name: Test
      run: dotnet test -c Release --no-build --verbosity normal

    - name: Upload portable builds
      uses: actions/upload-artifact@v4
      with:
        name: JobTracker-Portable
        path: Portable/JobTracker-*.zip.*
        if-no-files-found: error

  msi:
    runs-on: windows-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore local tools
      run: dotnet tool restore

    - name: Build MSI (x64)
      run: .\build\build-msi.ps1 -Runtime win-x64
      shell: pwsh
      env:
        BUILD_NUMBER: ${{ github.run_number }}

    - name: Build MSI (x86)
      run: .\build\build-msi.ps1 -Runtime win-x86
      shell: pwsh
      env:
        BUILD_NUMBER: ${{ github.run_number }}

    - name: Upload MSI installers
      uses: actions/upload-artifact@v4
      with:
        name: JobTracker-MSI
        path: Installer/JobTracker-Setup-*.msi
        if-no-files-found: error

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: [build, msi]
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download portable builds
      uses: actions/download-artifact@v4
      with:
        name: JobTracker-Portable
        path: artifacts/portable

    - name: Download MSI installers
      uses: actions/download-artifact@v4
      with:
        name: JobTracker-MSI
        path: artifacts/msi

    - name: Generate version tag
      id: version
      run: |
        TAG="v1.$(date -u +%y).$(date -u +%m%d).${{ github.run_number }}"
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "Version: $TAG"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: JobTracker ${{ steps.version.outputs.tag }}
        generate_release_notes: true
        files: |
          artifacts/portable/*
          artifacts/msi/*
