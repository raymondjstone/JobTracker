# Build, test, create MSI installer, and publish a GitHub Release
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release -p:CreatePortableZip=false
      env:
        BUILD_NUMBER: ${{ github.run_number }}

    - name: Test
      run: dotnet test -c Release --no-build --verbosity normal

    - name: Restore local tools
      run: dotnet tool restore

    - name: Build MSI
      run: .\build\build-msi.ps1 -Runtime win-x64
      shell: pwsh
      env:
        BUILD_NUMBER: ${{ github.run_number }}

    - name: Upload MSI installer
      uses: actions/upload-artifact@v4
      with:
        name: JobTracker-Setup
        path: Installer/JobTracker-Setup-win-x64.msi
        if-no-files-found: error

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download MSI
      uses: actions/download-artifact@v4
      with:
        name: JobTracker-Setup
        path: artifacts

    - name: Generate version tag
      id: version
      run: |
        BUILD_NUM=$(( ${{ github.run_number }} + 500 ))
        TAG="v1.$(date -u +%y).${BUILD_NUM}.$(date -u +%m%d)"
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "Version: $TAG"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: JobTracker ${{ steps.version.outputs.tag }}
        generate_release_notes: true
        files: artifacts/JobTracker-Setup-win-x64.msi
